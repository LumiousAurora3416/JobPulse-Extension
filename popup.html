<!DOCTYPE html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>同步到飞书</title>
    <style>
      :root {
        --byte-blue: #3370ff;
        --byte-blue-hover: #2860e1;
        --byte-blue-light: #e8f0ff;
        --text-primary: #1f2329;
        --text-secondary: #646a73;
        --border: #dee0e3;
        --bg-page: #f5f7fa;
        --danger: #d83931;
        --radius: 8px;
        --shadow: 0 2px 8px rgba(31, 35, 41, 0.08);
      }
      * {
        box-sizing: border-box;
      }
      body {
        width: 380px;
        margin: 0;
        padding: 16px;
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto,
          "PingFang SC", "Microsoft YaHei", sans-serif;
        font-size: 14px;
        color: var(--text-primary);
        background: var(--bg-page);
      }
      h1 {
        margin: 0 0 14px;
        font-size: 16px;
        font-weight: 600;
        color: var(--text-primary);
        letter-spacing: -0.02em;
      }
      .card {
        background: #fff;
        border-radius: var(--radius);
        box-shadow: var(--shadow);
        padding: 16px;
        border: 1px solid var(--border);
      }
      label {
        display: block;
        margin-bottom: 6px;
        font-size: 12px;
        font-weight: 500;
        color: var(--text-secondary);
      }
      .field {
        margin-bottom: 12px;
      }
      .field:last-of-type {
        margin-bottom: 0;
      }
      input[type="text"],
      select {
        width: 100%;
        padding: 8px 10px;
        border: 1px solid var(--border);
        border-radius: 6px;
        font-size: 13px;
        color: var(--text-primary);
        background: #fff;
        outline: none;
        transition: border-color 0.15s ease;
      }
      input[type="text"]:focus,
      select:focus {
        border-color: var(--byte-blue);
        box-shadow: 0 0 0 2px var(--byte-blue-light);
      }
      input[readonly] {
        background: #f8f9fa;
        color: var(--text-secondary);
      }
      textarea {
        width: 100%;
        min-height: 120px;
        padding: 8px 10px;
        border: 1px solid var(--border);
        border-radius: 6px;
        font-size: 12px;
        line-height: 1.5;
        color: var(--text-primary);
        background: #fff;
        outline: none;
        resize: vertical;
        font-family: inherit;
        transition: border-color 0.15s ease;
      }
      textarea:focus {
        border-color: var(--byte-blue);
        box-shadow: 0 0 0 2px var(--byte-blue-light);
      }
      textarea::placeholder {
        color: #bbb;
      }
      .actions {
        margin-top: 16px;
        display: flex;
        gap: 8px;
      }
      button.primary {
        flex: 1;
        padding: 10px 16px;
        border: none;
        border-radius: 6px;
        font-size: 14px;
        font-weight: 500;
        color: #fff;
        background: var(--byte-blue);
        cursor: pointer;
        transition: background 0.15s ease;
      }
      button.primary:hover:not(:disabled) {
        background: var(--byte-blue-hover);
      }
      button.primary:disabled {
        opacity: 0.65;
        cursor: not-allowed;
      }
      .hint {
        margin-top: 10px;
        font-size: 11px;
        color: var(--text-secondary);
        line-height: 1.45;
      }
      .msg {
        margin-top: 12px;
        padding: 8px 10px;
        border-radius: 6px;
        font-size: 12px;
        line-height: 1.4;
        display: none;
      }
      .msg.show {
        display: block;
      }
      .msg.ok {
        background: #e8ffea;
        color: #0d7a3e;
        border: 1px solid #b7eb8f;
      }
      .msg.err {
        background: #fff2f0;
        color: var(--danger);
        border: 1px solid #ffccc7;
      }
      .dash-link {
        display: block;
        text-align: center;
        padding: 6px 0;
        font-size: 12px;
        color: var(--byte-blue);
        text-decoration: none;
        border-radius: 6px;
        transition: background 0.15s;
      }
      .dash-link:hover {
        background: var(--byte-blue-light);
      }
    </style>
  </head>
  <body>
    <h1>同步到飞书多维表格</h1>
    <div class="card">
      <div class="field">
        <label for="position">岗位</label>
        <input type="text" id="position" placeholder="页面顶部职位名，如「产品实习生」" autocomplete="off" />
      </div>
      <div class="field">
        <label for="company">公司</label>
        <input type="text" id="company" placeholder="自动识别，可修改" autocomplete="off" />
      </div>
      <div class="field">
        <label for="jobDesc">岗位 JD</label>
        <textarea id="jobDesc" placeholder="从页面正文自动抓取，可删减后提交"></textarea>
      </div>
      <div class="field">
        <label for="applyUrl">投递链接</label>
        <input type="text" id="applyUrl" readonly placeholder="当前页 URL" />
      </div>
      <div class="field">
        <label for="salary">薪资</label>
        <input type="text" id="salary" placeholder="如 15k-25k·14薪，BOSS直聘自动抓取" autocomplete="off" />
      </div>
      <div class="field">
        <label for="result">结果</label>
        <select id="result">
          <option value="简历" selected>简历</option>
        </select>
      </div>
      <div class="actions">
        <button type="button" class="primary" id="submitBtn">写入飞书</button>
      </div>
      <div class="actions">
        <a href="dashboard.html" target="_blank" class="dash-link">📊 数据看板</a>
      </div>
      <p class="hint">
        请在职位详情页打开：岗位 JD 自动识别「职位描述」「岗位职责」「工作职责」等段落。若写入提示
        Forbidden / 无权限，请在飞书为应用开通多维表格权限并授权访问该 Base。
      </p>
      <div id="message" class="msg" role="status"></div>
    </div>
    <script src="popup.js"></script>
  </body>
</html>
